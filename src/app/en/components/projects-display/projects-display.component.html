<div id="container__section" class="relative">
    <section class="max-w-[1200px] relative my-20 mx-auto grid grid-cols-1 sm:grid-cols-2 place-items-center gap-4">
        <div *ngFor="let project of myProjects" class="relative overflow-y-scroll max-w-full h-[245px] p-6 border rounded-lg shadow-sm bg-gray-800 border-gray-700 hover:*:first:*:text-blue-300 hover:*:first:*:transition hover:*:first:*:duration-100">
            <a [href]="project.projectURL" target="_blank">
                <h5 class="mb-2 text-2xl font-bold tracking-wider font-title text-white"> {{ project.name }} <i class="fa-solid fa-folder"></i> </h5>
            </a>
            <hr class="mb-2 opacity-25">
            <p class="font-normal text-gray-400"> {{ project.description }} </p>
            <!-- Modal toggle -->
            <button attr.data-modal-target="modal-{{project.name}}" attr.data-modal-toogle="modal-{{project.name}}" class="btn block lg:absolute bottom-0 left-0 right-0 md:w-[70%] mx-auto text-white focus:ring-4 focus:outline-none font-medium rounded-lg text-sm m-3 px-5 py-2.5 text-center bg-blue-600 hover:bg-blue-700 focus:ring-blue-800" type="button">
                See Live Demo
            </button>
        </div>
    </section>
    <div id="see_more_btn" class="max-w-max absolute right-0 left-0 mx-auto bottom-0 translate-y-10">
        <a class="text-white hover:text-blue-300 transition duration-100 p-2 bg-gray-800 rounded-md" href="https://github.com/NbglRoot?tab=repositories" target="_blank">See More<i class="fab fa-github mx-1"></i> </a>
    </div>
</div>

<!-- Extra Large Modal -->
<div *ngFor="let project of myProjects" id="modal-{{project.name}}" tabindex="-1" class="modal absolute top-0 mt-15 md:mt-0 left-0 right-0 z-50 hidden w-full h-[650px] p-4 overflow-x-hidden overflow-y-hidden">
    <div class="relative w-full max-w-7xl h-full">
        <!-- Modal content -->
        <div class="relative h-full rounded-lg shadow-sm bg-gray-700">
            <!-- Modal header -->
            <div class="flex items-center justify-between p-4 md:p-5 border-b rounded-t  border-gray-200">
                <h3 class="text-xl font-medium text-white">
                    {{ project.name }}
                </h3>
                <button type="button" class="text-gray-400 bg-transparent rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center hover:bg-gray-600 hover:text-white btn-close-modal" attr.data-modal-hide="modal-{{project.name}}">
                    <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
                    </svg>
                    <span class="sr-only">Cerrar Ventana</span>
                </button>
            </div>
            <!-- Modal body -->
            <div class="p-4 md:p-5 h-full space-y-4">
                <ng-template [ngIf]="project.statusUrl" [ngIfElse]="falseUrl">
                    <iframe 
                    [src]="sanitazeUrl(project.projectURL)"
                    sandbox="allow-scripts allow-same-origin allow-popups allow-presentation allow-forms allow-modals"
                    loading="lazy"
                    referrerpolicy="no-referrer"
                    class="w-full h-[88%] rounded-md"
                    frameborder="0"
                    allow="fullscreen"
                    credentialless
                    fetchpriority="low"></iframe>
                </ng-template>
                <ng-template #falseUrl id="falseUrl">
                    <p class="text-gray-400">There is no content available for this project</p>
                </ng-template>
            </div>
        </div>
    </div>
</div>

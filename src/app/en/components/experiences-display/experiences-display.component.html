<section id="experiences-section" class="max-w-[900px] mx-auto">
    <ol class="relative border-s  border-gray-700">                  
        <li *ngFor="let experience of experiences" class="mb-10 ms-4">
            <div class="absolute w-3 h-3 rounded-full mt-1.5 -start-1.5 border border-gray-900 bg-gray-700"></div>
            <time class="mb-1 text-sm font-normal leading-none  text-gray-500">{{ experience.date }}</time>
            <h3 class="text-lg font-semibold  text-white">{{ experience.title }}</h3>
            <p class="mb-4 text-base font-normal  text-gray-400">
                {{ experience.description }}
            </p>
        </li>
    </ol>
</section>

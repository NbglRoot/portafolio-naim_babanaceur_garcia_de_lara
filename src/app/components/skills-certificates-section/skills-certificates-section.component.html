<section *ngIf="showSection === true; else certificatesDisplay"  id="skillsAndCertificates" class=" max-w-[1200px] mx-auto mb-22 animate__animated animate__fadeIn">
    <h1 class="text-2xl text-center mb-12 underline hover:animate-bounce mx-auto w-max">Skills</h1>
    <div id="skills_container" class="flex max-w-[850px] mx-auto flex-wrap justify-center items-center gap-7 gap-y-8">
        <div *ngFor="let skill of skills" [title]="skill.name" class="progress_container cursor-cell opacity-0 transition-all duration-300 hover:backdrop-blur-md hover:scale-105 bg-gradient-to-b from-gray-300 to-gray-800 hover:from-gray-600 hover:to-gray-950 text-center w-32 mx-auto outline-1 outline-offset-8 outline-gray-500/50 rounded-md">
            <i class="{{ skill.icon }} text-7xl mb-3 mt-3 transition duration-100"></i>
            <div class="w-full rounded-full h-2.5 bg-gray-700">
                <div class="bg-blue-600 h-2.5 rounded-full skills_bar animate-pulse w-0" [style.width]="skill.level + '%'"></div>
            </div>   
        </div>
    </div>
</section>
<ng-template #certificatesDisplay>
    <section class="max-w-[1200px] mx-auto mb-22 animate__animated animate__fadeIn">
        <h1 class="text-2xl text-center mb-12 underline hover:animate-bounce mx-auto w-max">Certificados</h1>
        <div id="certificates_container" class="flex flex-wrap justify-center items-center gap-7">
            <a *ngFor="let certificate of certificates" [href]="certificate.url" target="_blank" class="block text-center md:w-auto md:max-w-sm max-w-full w-full p-6  border rounded-lg shadow-sm  bg-gray-800 border-gray-700 hover:bg-gray-700">
                <h5 class="mb-2 text-2xl font-bold tracking-tight text-white">{{ certificate.name }}</h5>
            </a>
        </div>
    </section>
</ng-template>

<div id="toggle-showSection" class="text-center mb-20"> <!-- Toggle Btn Skills/Certificates -->
    <label class="inline-flex items-center me-5 hover:outline-1 outline-offset-8 outline-gray-500/50 bg-gray-500 hover:bg-gray-400/75 p-5 rounded-md cursor-pointer">
        <input type="checkbox" id="btn_toggle" class="sr-only peer" [checked]="showSection ? false : true">
        <div class="relative w-11 h-6  rounded-full peer peer-focus:ring-4 peer-focus:ring-red-800 bg-gray-700 peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all border-gray-600 peer-checked:bg-red-600/75"></div>
        <span class="ms-3 text-sm font-medium  text-gray-300"> {{ showSection ? 'Skills' : 'Certificados' }} </span>
    </label>
</div>

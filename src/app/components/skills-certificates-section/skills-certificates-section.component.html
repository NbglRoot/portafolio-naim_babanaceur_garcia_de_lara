<!-- begin :: Skills -->
<section id="skill_section" *ngIf="TOOGLE_SECTIONS_SKILLS" class="max-w-[1200px] my-20 mx-auto">
    <div class="w-full flex flex-row flex-wrap xl:flex-nowrap justify-center gap-15 lg:gap-5 items-center">
        <div 
        *ngFor="let skill of skills" 
        [ngStyle]="{ animationDuration: skill.animationDuration }" 
        class="relative skill_card opacity-0 w-[100px] sm:w-42 h-42 flex flex-col justify-center items-center gap-2 p-4 bg-gradient-to-t from-gray-400 to-transparent dark:from-gray-800 dark:to-transparent rounded-md cursor-cell hover:bg-gray-300 dark:hover:bg-gray-700 hover:scale-105 hover:rotate-4 hover:bg-gradient-to-b hover:from-gray-200 hover:dark:from-gray-800 hover:to-gray-300 hover:dark:to-gray-700 hover:[&>i]:-rotate-4 hover:[&>i]:scale-125 transition duration-150">
            <i [ngClass]="skill.icon" class="text-4xl transition duration-200"></i>
            <span class="absolute top-0 -my-3 text-center font-secondary font-bold tracking-widest text-sm">{{ !componentLanguageEN ? skill.name : skill.nameEN || skill.name }}</span>
        </div>
    </div>
</section>
<!-- end :: Skills -->

<!-- begin :: Certificates -->
<section id="certificate_section" *ngIf="!TOOGLE_SECTIONS_SKILLS" class="max-w-[900px] my-20 mx-auto">
    <div class="flex flex-wrap justify-center items-center gap-4">
        <div 
        *ngFor="let certificate of certificates" 
        [ngStyle]="{ animationDuration: certificate.animationDuration }" 
        class="certificate_card_animated opacity-0 flex items-center gap-2">
            <a [href]="certificate.url" target="_blank" class="text-md p-2 bg-blue-600 hover:bg-blue-800 hover:scale-105 transition duration-100 text-white rounded-md">{{ !componentLanguageEN ? certificate.name : certificate.nameEN }}</a>
        </div>
    </div>
</section>
<!-- end :: Certificates -->

<!-- begin :: Switch -->
<section class="max-w-[900px] mx-auto my-10 text-center">
    <label class="inline-flex items-center cursor-pointer">
        <i class="fas fa-arrow-right mr-3 text-md arrow-right-bounce"></i>
        <input (change)="changeSection()" type="checkbox" class="sr-only peer" [checked]="TOOGLE_SECTIONS_SKILLS">
        <div class="relative w-11 h-6 bg-gray-200 rounded-full peer dark:bg-gray-700 peer-focus:ring-4 peer-focus:ring-purple-300 dark:peer-focus:ring-purple-800 peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-purple-600 dark:peer-checked:bg-purple-600"></div>
        <span [ngClass]="componentLanguageEN ? 'hidden' : 'block'" class="ms-3 text-sm font-medium text-gray-900 dark:text-gray-300"> {{ TOOGLE_SECTIONS_SKILLS ? 'Skills' : 'Certificados' }} </span>
        <span [ngClass]="componentLanguageEN ? 'block' : 'hidden'" class="ms-3 text-sm font-medium text-gray-900 dark:text-gray-300"> {{ TOOGLE_SECTIONS_SKILLS ? 'Skills' : 'Certificates' }} </span>
    </label>
</section>
<!-- end :: Switch -->

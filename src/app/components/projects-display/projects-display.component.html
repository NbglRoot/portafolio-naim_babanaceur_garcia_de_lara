<div id="container__section" class="relative">
    <section class="max-w-[1200px] my-20 mx-auto grid grid-cols-1 sm:grid-cols-2 place-items-center gap-4">
        <div *ngFor="let project of myProjects" class="relative max-w-full h-full p-6 border rounded-lg shadow-sm bg-gray-800 border-gray-700 hover:*:first:*:text-blue-300 hover:*:first:*:transition hover:*:first:*:duration-100">
            <a [href]="project.projectURL" target="_blank">
                <h5 class="mb-2 text-2xl font-bold tracking-wider font-title text-white"> {{ project.name }} <i class="fa-solid fa-folder"></i> </h5>
            </a>
            <hr class="mb-2 opacity-25">
            <p class="font-normal text-gray-400"> {{ project.description }} </p>
        </div>
    </section>
    <div id="see_more_btn" class="max-w-max absolute right-0 left-0 mx-auto bottom-0 translate-y-10">
        <a class="text-white hover:text-blue-300 transition duration-100 p-2 bg-gray-800 rounded-md" href="">Ver Mas <i class="fab fa-github mx-1"></i> </a>
    </div>
</div>

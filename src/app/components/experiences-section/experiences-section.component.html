<section id="experience_section" class="max-w-[900px] mx-auto my-20">
    <ol class="relative border-s border-gray-200 dark:border-gray-700">                  
        <li *ngFor="let experience of experiences" [ngStyle]="{ animationDelay: (experiences.indexOf(experience) * 0.5) + 's' }" class="experience_entry mb-10 ms-4">
            <div class="absolute w-3 h-3 bg-gray-200 rounded-full mt-1.5 -start-1.5 border border-white dark:border-gray-900 dark:bg-gray-700"></div>
            <time class="mb-1 text-sm font-normal leading-none text-gray-400 dark:text-gray-500">{{ experience.date }}</time>
            <h3 class="text-lg font-semibold text-gray-900 dark:text-white">{{ experience.title }}</h3>
            <p class="text-base font-normal text-gray-500 dark:text-gray-400">{{ experience.description }}</p>
        </li>
    </ol>
</section>
